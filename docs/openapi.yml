openapi: 3.1.0

info:
  title: Teman Berbahasa Management System API
  description: |
    Internal backend API for the Teman Berbahasa Tutor Place Management System.
    Staff and teacher-facing; no student-facing portal.

    ## Authentication
    All protected endpoints require a JWT Bearer token in the `Authorization` header.
    Tokens are RS256-signed. Access tokens expire in **15 minutes**; refresh tokens in **7 days**.

    ## Error Envelope
    All error responses use a consistent envelope:
    ```json
    { "error": { "code": "ERROR_CODE", "message": "Human-readable message" } }
    ```
    Validation errors additionally include a `fields` map:
    ```json
    { "error": { "code": "VALIDATION_ERROR", "message": "validation failed", "fields": { "email": "required" } } }
    ```

    ## Conventions
    - All IDs are UUID v7 strings.
    - All datetimes are ISO 8601 UTC.
    - Field names are `snake_case` throughout.
    - String fields are trimmed of leading/trailing whitespace before processing.
  version: 0.1.0
  contact:
    name: Hernando
    email: borosi.hernando@gmail.com

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.temanberbahasa.id
    description: Production (via Caddy reverse proxy, auto TLS)

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Service health and readiness checks.
  - name: Auth
    description: |
      Authentication flows: login, token refresh, logout, and password reset.
      No auth header required on any of these endpoints.
  - name: Users
    description: |
      CRUD for internal staff accounts (admin/teacher/staff).
      All endpoints require a valid JWT. Create/update/list restricted to `admin` role.
      `GET /users/{id}` is accessible to the owner or any admin.
  - name: Students
    description: |
      CRUD for student records.
      All endpoints require a valid JWT. Create/update restricted to `admin` and `staff` roles.
      All authenticated roles can view students.
  - name: Courses
    description: |
      Course catalog CRUD and archive.
      All endpoints require a valid JWT. Create/update/archive restricted to `admin` role.
      All authenticated roles can view courses.

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Health check
      description: |
        Returns the operational status of the API and its database connection.
        Responds `503 Service Unavailable` if the database ping fails (2-second timeout).
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                db: ok
        "503":
          description: Service is degraded — database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: error
                db: error

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in
      description: |
        Authenticates a staff/teacher account with email and password.
        Returns an access token, a refresh token, and basic user info.

        **Account lock:** After 10 consecutive failed attempts the account is locked and
        returns `401 ACCOUNT_LOCKED`. Successful login resets the failure counter.

        **Inactive accounts** are rejected with `401 UNAUTHORIZED` (same response as bad
        credentials — no user enumeration).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: staff@temanberbahasa.id
              password: s3cur3P@ss
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                refresh_token: a3f1d2c4e5b6...
                expires_in: 900
                user:
                  id: 019687a2-0000-7000-8000-000000000001
                  first_name: Siti
                  last_name: Rahayu
                  role: staff
        "401":
          description: Invalid credentials or account locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_credentials:
                  summary: Wrong email or password
                  value:
                    error:
                      code: UNAUTHORIZED
                      message: invalid email or password
                account_locked:
                  summary: Too many failed attempts
                  value:
                    error:
                      code: ACCOUNT_LOCKED
                      message: account is locked due to too many failed login attempts
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token and a new refresh token
        (token rotation — the old refresh token is invalidated immediately).

        Reusing an already-rotated refresh token returns `401 UNAUTHORIZED`.
        Expired refresh tokens also return `401 UNAUTHORIZED`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refresh_token: a3f1d2c4e5b6...
      responses:
        "200":
          description: Token refreshed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
              example:
                access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                refresh_token: b9e2a1f3d4c5...
                expires_in: 900
        "401":
          description: Refresh token is invalid, expired, or already rotated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UNAUTHORIZED
                  message: invalid or expired refresh token
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out
      description: |
        Revokes the supplied refresh token and all other refresh tokens belonging to
        the same user (full device logout). Idempotent — submitting an unknown or
        already-revoked token still returns `204`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
            example:
              refresh_token: a3f1d2c4e5b6...
      responses:
        "204":
          description: Logged out successfully (no body).
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request password reset
      description: |
        Sends a password-reset link to the supplied email address if it matches an
        active account. Always returns `200` with the same body regardless of whether
        the email exists — prevents user enumeration.

        The reset token embedded in the link expires after **1 hour**.
        Any previous unused reset tokens for the account are invalidated before the new
        one is issued.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
            example:
              email: staff@temanberbahasa.id
      responses:
        "200":
          description: Request processed (email may or may not have been sent).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "If that email exists, a reset link has been sent."
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password
      description: |
        Sets a new password using a one-time reset token obtained from the
        forgot-password email link.

        On success, all existing refresh tokens for the account are revoked so all
        active sessions are terminated.

        **Password requirements:** minimum 8 characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
            example:
              token: a3f1d2c4e5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2
              new_password: newS3cur3P@ss
      responses:
        "200":
          description: Password updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Password updated. Please log in again."
        "400":
          description: Reset token is invalid or has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BAD_REQUEST
                  message: invalid or expired reset token
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get current session
      description: |
        Returns the authenticated user's profile. Use to verify a session is still
        valid and retrieve the same user object returned by `POST /auth/login`.

        Requires a valid Bearer access token.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session is valid; user info returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
              example:
                id: 019687a2-0000-7000-8000-000000000001
                first_name: Siti
                last_name: Rahayu
                role: admin
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users
      description: Returns paginated list of staff accounts. Restricted to `admin` role.
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, teacher, staff]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: Paginated user list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Users]
      operationId: createUser
      summary: Create user
      description: |
        Creates a new staff account and sends an invite email with a password-set link.
        Restricted to `admin` role. `created_by_user_id` is server-set from JWT.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              first_name: Budi
              last_name: Santoso
              email: budi@temanberbahasa.id
              role: teacher
              phone: "081234567890"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{id}:
    get:
      tags: [Users]
      operationId: getUser
      summary: Get user
      description: |
        Returns a single user. Accessible by the owner (own record) or any `admin`.
        Returns `403` if a non-admin requests another user's record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: User found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Users]
      operationId: updateUser
      summary: Update user (partial)
      description: |
        Partially updates a user. All fields optional. Restricted to `admin` role.
        Changing `role` or setting `status = inactive` immediately invalidates all
        active sessions for the target user.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            example:
              status: inactive
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /students:
    get:
      tags: [Students]
      operationId: listStudents
      summary: List students
      description: |
        Returns paginated list of student records. All authenticated roles allowed.
        Each item includes `enrolled_batches` — an array of active batch codes for
        that student (non-dropped enrollments only).
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, graduated]
        - name: search
          in: query
          description: Full-text search across first_name, last_name, and email (case-insensitive).
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: Paginated student list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Students]
      operationId: createStudent
      summary: Create student
      description: |
        Registers a new student. Restricted to `admin` and `staff` roles.
        `registration_date` defaults to today if omitted. `email` is optional.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
            example:
              first_name: Rina
              last_name: Kusuma
              email: rina@email.com
              phone: "082111111111"
              date_of_birth: "2010-03-15"
              gender: female
              parent_name: Dewi Kusuma
              parent_phone: "081222222222"
      responses:
        "201":
          description: Student created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /students/{id}:
    get:
      tags: [Students]
      operationId: getStudent
      summary: Get student
      description: |
        Returns a single student with full enrollment history (all statuses).
        All authenticated roles allowed.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Student found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Students]
      operationId: updateStudent
      summary: Update student (partial)
      description: |
        Partially updates a student record. All fields optional.
        Restricted to `admin` and `staff` roles.
        Response does not include the `enrollments` array.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
            example:
              status: graduated
      responses:
        "200":
          description: Student updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentObject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /courses:
    get:
      tags: [Courses]
      operationId: listCourses
      summary: List courses
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: level
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated list of courses with stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CourseWithStats"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Courses]
      operationId: createCourse
      summary: Create a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Course created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /courses/{id}:
    get:
      tags: [Courses]
      operationId: getCourse
      summary: Get a course
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Course with stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Courses]
      operationId: updateCourse
      summary: Update a course
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: Updated course.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /courses/{id}/archive:
    patch:
      tags: [Courses]
      operationId: archiveCourse
      summary: Archive a course
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Course archived.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: archived
                  updated_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT. Obtain via `POST /auth/login`. Expires in 15 minutes.

  schemas:
    # ── Requests ─────────────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Registered staff/teacher email address. Trimmed before lookup.
        password:
          type: string
          description: Account password.
          minLength: 1

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Opaque refresh token returned by login or a previous refresh call.

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Opaque refresh token to revoke. All tokens for the user are revoked.

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email address associated with the account. Trimmed before lookup.

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          description: One-time reset token from the password-reset email link (hex-encoded, 64 chars).
        new_password:
          type: string
          minLength: 8
          description: New password. Minimum 8 characters.

    # ── Responses ────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status, db]
      properties:
        status:
          type: string
          enum: [ok, error]
          description: Overall API status.
        db:
          type: string
          enum: [ok, error]
          description: PostgreSQL connectivity status (2-second ping timeout).

    LoginResponse:
      type: object
      required: [access_token, refresh_token, expires_in, user]
      properties:
        access_token:
          type: string
          description: RS256-signed JWT. Valid for `expires_in` seconds.
        refresh_token:
          type: string
          description: Opaque token. Valid for 7 days. Use `POST /auth/refresh` to rotate.
        expires_in:
          type: integer
          description: Access token lifetime in seconds (always 900).
          example: 900
        user:
          $ref: "#/components/schemas/UserInfo"

    TokenPair:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
          description: New RS256-signed JWT. Valid for `expires_in` seconds.
        refresh_token:
          type: string
          description: New opaque refresh token. The previous token is now invalid.
        expires_in:
          type: integer
          description: Access token lifetime in seconds (always 900).
          example: 900

    UserInfo:
      type: object
      required: [id, first_name, last_name, role]
      properties:
        id:
          type: string
          format: uuid
          description: UUID v7 identifier of the authenticated user.
          example: 019687a2-0000-7000-8000-000000000001
        first_name:
          type: string
          example: Siti
        last_name:
          type: string
          example: Rahayu
        role:
          type: string
          enum: [admin, teacher, staff]
          description: User role. Controls access to protected endpoints.

    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # ── User schemas ──────────────────────────────────────────────────────────

    UserObject:
      type: object
      required:
        [id, first_name, last_name, email, role, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, teacher, staff]
        phone:
          type: [string, "null"]
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserObject"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    CreateUserRequest:
      type: object
      required: [first_name, last_name, email, role]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, teacher, staff]
        phone:
          type: [string, "null"]

    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, teacher, staff]
        phone:
          type: [string, "null"]
        status:
          type: string
          enum: [active, inactive]

    # ── Student schemas ───────────────────────────────────────────────────────

    StudentObject:
      type: object
      required:
        [
          id,
          first_name,
          last_name,
          registration_date,
          status,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
        date_of_birth:
          type: [string, "null"]
          format: date
        gender:
          type: [string, "null"]
          enum: [male, female, other]
        address:
          type: [string, "null"]
        parent_name:
          type: [string, "null"]
        parent_phone:
          type: [string, "null"]
        registration_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, graduated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StudentListItem:
      allOf:
        - $ref: "#/components/schemas/StudentObject"
        - type: object
          required: [enrolled_batches]
          properties:
            enrolled_batches:
              type: array
              items:
                type: string
              description: Active batch codes (non-dropped enrollments). Empty array if none.
              example: ["B001", "B003"]

    StudentListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/StudentListItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    BatchRef:
      type: object
      required: [id, batch_name, batch_code, status]
      properties:
        id:
          type: string
          format: uuid
        batch_name:
          type: string
        batch_code:
          type: string
        status:
          type: string
          enum: [upcoming, ongoing, completed]

    CourseRef:
      type: object
      required: [id, course_name, course_code]
      properties:
        id:
          type: string
          format: uuid
        course_name:
          type: string
        course_code:
          type: string
        level:
          type: [string, "null"]
          enum: [beginner, intermediate, advanced]

    EnrollmentSummary:
      type: object
      required: [id, status, payment_status, enrollment_date, batch, course]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [enrolled, dropped, completed]
        payment_status:
          type: string
          enum: [pending, partial, paid]
        enrollment_date:
          type: string
          format: date
        batch:
          $ref: "#/components/schemas/BatchRef"
        course:
          $ref: "#/components/schemas/CourseRef"

    StudentDetail:
      allOf:
        - $ref: "#/components/schemas/StudentObject"
        - type: object
          required: [enrollments]
          properties:
            enrollments:
              type: array
              items:
                $ref: "#/components/schemas/EnrollmentSummary"
              description: All enrollments (all statuses). Empty array if none.

    CreateStudentRequest:
      type: object
      required: [first_name, last_name]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
        date_of_birth:
          type: [string, "null"]
          format: date
        gender:
          type: [string, "null"]
          enum: [male, female, other]
        address:
          type: [string, "null"]
        parent_name:
          type: [string, "null"]
        parent_phone:
          type: [string, "null"]
        registration_date:
          type: [string, "null"]
          format: date
          description: Defaults to today if omitted.

    UpdateStudentRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
        date_of_birth:
          type: [string, "null"]
          format: date
        gender:
          type: [string, "null"]
          enum: [male, female, other]
        address:
          type: [string, "null"]
        parent_name:
          type: [string, "null"]
        parent_phone:
          type: [string, "null"]
        status:
          type: string
          enum: [active, inactive, graduated]

    # ── Course schemas ────────────────────────────────────────────────────────

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_name:
          type: string
        course_code:
          type: string
        description:
          type: string
          nullable: true
        subject:
          type: string
          nullable: true
        level:
          type: string
          enum: [beginner, intermediate, advanced]
          nullable: true
        duration_weeks:
          type: integer
          nullable: true
        price:
          type: string
          example: "480000.00"
          nullable: true
        max_capacity:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CourseWithStats:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            batch_count:
              type: integer
            ongoing_batch_count:
              type: integer
            enrolled_count:
              type: integer

    CreateCourseRequest:
      type: object
      required: [course_name, course_code]
      properties:
        course_name:
          type: string
        course_code:
          type: string
        description:
          type: string
        subject:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        duration_weeks:
          type: integer
        price:
          type: string
          example: "480000.00"
        max_capacity:
          type: integer

    UpdateCourseRequest:
      type: object
      properties:
        course_name:
          type: string
        course_code:
          type: string
        description:
          type: string
        subject:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        duration_weeks:
          type: integer
        price:
          type: string
          example: "480000.00"
        max_capacity:
          type: integer

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable status message.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code.
              enum:
                - BAD_REQUEST
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - GONE
                - VALIDATION_ERROR
                - RATE_LIMITED
                - ACCOUNT_LOCKED
                - INTERNAL_ERROR
            message:
              type: string
              description: Human-readable explanation.
            fields:
              type: object
              description: |
                Present only on `VALIDATION_ERROR`. Maps field name to the failing
                validation tag (e.g. `"email": "required"`, `"new_password": "min"`).
              additionalProperties:
                type: string

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID v7 identifier of the resource.

    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number (1-indexed).

    perPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Items per page (max 100).

  responses:
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: missing or invalid token

    Forbidden:
      description: Valid JWT but insufficient role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: access denied

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: resource not found

    Conflict:
      description: Unique constraint violation (e.g. duplicate email).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: CONFLICT
              message: email already in use

    ValidationError:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: validation failed
              fields:
                email: required
                password: required

    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: internal server error
